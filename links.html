// Build dept list with counts
const deptCount = {};
DATA.forEach(d=>{deptCount[d.dept]=(deptCount[d.dept]||0)+1;});
const depts = Object.keys(deptCount).sort((a,b)=>deptCount[b]-deptCount[a]);

let activeDept = '';

// Render dept buttons
const dfEl = document.getElementById('deptFilters');
const allBtn = document.createElement('button');
allBtn.className='dept-btn active';
allBtn.innerHTML='すべて <span class="cnt">1926</span>';
allBtn.onclick=()=>setDept('');
dfEl.appendChild(allBtn);

depts.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='dept-btn';
  btn.dataset.dept=d;
  btn.innerHTML=d+'<span class="cnt">'+deptCount[d]+'</span>';
  btn.onclick=()=>setDept(d);
  dfEl.appendChild(btn);
});

function setDept(d){
  activeDept=d;
  document.querySelectorAll('.dept-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.dept===d||(d===''&&!b.dataset.dept));
  });
  applyFilter();
}

function applyFilter(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=document.getElementById('urlList');
  const noRes=document.getElementById('noResults');
  list.innerHTML='';
  let count=0;
  const frag=document.createDocumentFragment();
  DATA.forEach(item=>{
    if(activeDept && item.dept!==activeDept) return;
    if(q && !item.url.toLowerCase().includes(q) && !item.dept.toLowerCase().includes(q) && !item.cat.toLowerCase().includes(q)) return;
    count++;
    const li=document.createElement('li');
    const path=item.url.replace('https://www.city.kami.lg.jp','');
    li.innerHTML='<span class="dept-tag">'+esc(item.dept)+'</span>'
      +'<a href="'+esc(item.url)+'" target="_blank" rel="noopener">'+esc(path)+'</a>';
    frag.appendChild(li);
  });
  list.appendChild(frag);
  document.getElementById('resultCount').textContent=count+'件';
  noRes.style.display=count===0?'':'none';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

applyFilter();
